<script>
// Stars
const sv = document.getElementById('stars');
for (let i = 0; i < 160; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2 + 0.3;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*6}s;animation-delay:${Math.random()*6}s`;
  sv.appendChild(s);
}

// Satellites canvas
const c = document.getElementById('satCanvas');

resize(); window.addEventListener('resize', resize);

  ctx.fillStyle='rgba(0,200,255,0.25)'; ctx.fillRect(-4*s,-5*s,8*s,10*s);
  ctx.strokeStyle='rgba(0,200,255,0.6)'; ctx.lineWidth=0.5*s; ctx.strokeRect(-4*s,-5*s,8*s,10*s);
  ctx.beginPath(); ctx.arc(bW/2-3*s,0,2.5*s,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fill(); ctx.strokeStyle='rgba(150,200,255,0.7)'; ctx.stroke();
  const pW=32*s, pH=12*s, pg=4*s;
  ctx.fillStyle='rgba(80,100,120,0.8)'; ctx.fillRect(-bW/2-pg,-1.5*s,pg,3*s); ctx.strokeRect(-bW/2-pg,-1.5*s,pg,3*s);

  const lg=ctx.createLinearGradient(lx,-pH/2,lx+pW,pH/2);
  lg.addColorStop(0,'rgba(10,30,80,0.95)'); lg.addColorStop(0.5,'rgba(20,50,140,0.95)'); lg.addColorStop(1,'rgba(5,20,60,0.95)');

  const cW=pW/4, cH=pH/3;
