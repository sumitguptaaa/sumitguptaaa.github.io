---
layout: default
---

<article class="post-article">

  <header class="post-header">
    <div class="post-meta-top">
      <span class="post-date">{{ page.date | date: "%Y-%m-%d" }}</span>
      {% if page.categories %}
      {% for cat in page.categories %}<span class="post-cat-tag">{{ cat }}</span>{% endfor %}
      {% endif %}
    </div>
    <h1 class="post-title-big">{{ page.title }}</h1>
    {% if page.tags %}
    <div class="post-tags-row">
      {% for tag in page.tags %}<span class="tag g">{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <div class="post-footer-inner">
      <a href="{{ '/' | relative_url }}" class="back-link">← All posts</a>
      <div class="post-share">
        <span class="share-label">Share:</span>
        <a href="https://github.com/sumitguptaaa" target="_blank">GitHub</a>
      </div>
    </div>
  </footer>

</article>
